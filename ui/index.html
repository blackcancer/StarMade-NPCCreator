<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarMade NPC Creator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/blockly@10.4.3/blockly.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   StarMade NPC Creator — Design System
   ═══════════════════════════════════════════════════════════════════════════ */

/* ── Design tokens ──────────────────────────────────────────────────────────── */
:root {
  --bg-base:       #0e1117;
  --bg-surface:    #141921;
  --bg-raised:     #1c2433;
  --bg-hover:      #243044;
  --bg-active:     #2d3d56;

  --border-subtle: #1f2d40;
  --border-muted:  #2a3d55;
  --border-focus:  #4a9eff;

  --text-primary:  #e2e8f0;
  --text-secondary:#8a9bb5;
  --text-muted:    #4a5a72;
  --text-code:     #cdd5e0;

  --accent:        #3b9eff;
  --accent-bright: #60b8ff;
  --accent-glow:   rgba(59,158,255,0.15);

  --success:       #34d399;
  --success-bg:    #0d3a28;

  --lua-kw:        #c792ea;
  --lua-str:       #a8e6a3;
  --lua-cmt:       #4a5a72;
  --lua-num:       #ffcb6b;

  --font-ui:   'Inter', 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;

  --radius-md: 7px;
  --t-fast:    120ms ease;
}

/* ── Reset ───────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-ui);
  background: var(--bg-base);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ──────────────────────────────────────────────────────────────────── */
header {
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-subtle);
  padding: 0 14px;
  height: 48px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  z-index: 10;
}

/* Brand — title + subtitle stacked */
.brand { display: flex; align-items: center; flex-shrink: 0; }
.brand-title { display: flex; flex-direction: column; gap: 1px; }

.brand h1 {
  font-size: 0.88rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--text-primary);
  white-space: nowrap;
  line-height: 1.1;
}
.brand h1 span { color: var(--accent-bright); }

.subtitle {
  font-size: 0.65rem;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  white-space: nowrap;
  line-height: 1.1;
}

.hdivider {
  width: 1px;
  height: 18px;
  background: var(--border-muted);
  flex-shrink: 0;
  margin: 0 3px;
}

.spacer { flex: 1; }

/* Script name */
.script-name-wrap { display: flex; align-items: center; gap: 5px; }
.script-name-wrap label {
  font-size: 0.66rem;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
}
#scriptName {
  background: var(--bg-raised);
  border: 1px solid var(--border-muted);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  padding: 4px 9px;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  width: 140px;
  outline: none;
  transition: border-color var(--t-fast), box-shadow var(--t-fast);
}
#scriptName:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

/* Example selector */
#exampleSelect {
  background: var(--bg-raised);
  border: 1px solid var(--border-muted);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  padding: 4px 7px;
  font-size: 0.76rem;
  cursor: pointer;
  outline: none;
  max-width: 160px;
  transition: border-color var(--t-fast);
}
#exampleSelect:hover, #exampleSelect:focus {
  border-color: var(--border-focus);
}

/* ── Buttons ─────────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 11px;
  border: 1px solid transparent;
  border-radius: var(--radius-md);
  font-family: var(--font-ui);
  font-size: 0.76rem;
  font-weight: 500;
  cursor: pointer;
  transition: background var(--t-fast), border-color var(--t-fast), color var(--t-fast);
  white-space: nowrap;
  outline: none;
}

.btn-secondary {
  background: transparent;
  border-color: var(--border-muted);
  color: var(--text-secondary);
}
.btn-secondary:hover {
  background: var(--bg-hover);
  border-color: var(--border-focus);
  color: var(--text-primary);
}

.btn-success {
  background: var(--success-bg);
  border-color: var(--success);
  color: var(--success);
  font-weight: 600;
}
.btn-success:hover {
  background: var(--success);
  color: #071f15;
}

/* ── Layout ──────────────────────────────────────────────────────────────────── */
.main { display: flex; flex: 1; overflow: hidden; }
#blocklyDiv { flex: 1; height: 100%; }

/* ── Output panel ────────────────────────────────────────────────────────────── */
.output-panel {
  width: 420px;
  background: var(--bg-base);
  border-left: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.output-tabs {
  display: flex;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
}
.tab {
  padding: 11px 18px;
  font-size: 0.76rem;
  font-weight: 500;
  cursor: pointer;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  transition: color var(--t-fast), border-color var(--t-fast);
  user-select: none;
}
.tab:hover  { color: var(--text-secondary); }
.tab.active { color: var(--accent-bright); border-bottom-color: var(--accent); }

.tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.tab-content.active { display: flex; }

pre#luaOutput {
  flex: 1;
  overflow: auto;
  padding: 14px 16px;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  line-height: 1.7;
  color: var(--text-code);
  white-space: pre;
}
pre#luaOutput::-webkit-scrollbar        { width: 5px; height: 5px; }
pre#luaOutput::-webkit-scrollbar-track  { background: transparent; }
pre#luaOutput::-webkit-scrollbar-thumb  { background: var(--border-muted); border-radius: 3px; }
pre#luaOutput::-webkit-scrollbar-thumb:hover { background: var(--border-focus); }

/* ── Lua syntax ───────────────────────────────────────────────────────────────── */
.kw  { color: var(--lua-kw); }
.str { color: var(--lua-str); }
.cmt { color: var(--lua-cmt); font-style: italic; }
.num { color: var(--lua-num); }

/* ── Status bar ───────────────────────────────────────────────────────────────── */
#statusBar {
  padding: 6px 16px;
  font-size: 0.7rem;
  background: var(--bg-surface);
  border-top: 1px solid var(--border-subtle);
  color: var(--text-muted);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
}
#statusBar::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--success);
  flex-shrink: 0;
}

/* ── Copy badge ───────────────────────────────────────────────────────────────── */
#copyBadge {
  position: fixed;
  bottom: 40px;
  right: 430px;
  background: var(--bg-raised);
  border: 1px solid var(--success);
  color: var(--success);
  padding: 7px 14px;
  border-radius: var(--radius-md);
  font-size: 0.78rem;
  font-weight: 600;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  animation: badgeFade 2.2s forwards;
  display: none;
}
@keyframes badgeFade {
  0%      { opacity:0; transform:translateY(4px); }
  10%,75% { opacity:1; transform:translateY(0); }
  100%    { opacity:0; transform:translateY(-4px); }
}

/* ════════════════════════════════════════════════════════════════════════════
   BLOCKLY OVERRIDES — minimal, ne pas casser le rendu des blocs
   ════════════════════════════════════════════════════════════════════════════ */

/* Canvas */
.blocklyMainBackground { fill: #0e1117 !important; }
.blocklyGridLine       { stroke: #1c2433 !important; }

/* Scrollbars */
.blocklyScrollbarHandle     { fill: #2a3d55 !important; }
.blocklyScrollbarBackground { fill: transparent !important; }

/* Toolbox */
.blocklyToolboxDiv {
  background: #141921 !important;
  border-right: 1px solid #1f2d40 !important;
}
.blocklyTreeLabel {
  color: #8a9bb5 !important;
  font-size: 0.78rem !important;
  font-family: 'Inter', sans-serif !important;
}
.blocklyTreeRow:hover        { background: #243044 !important; }
.blocklyTreeSelected > .blocklyTreeRow { background: #1c2433 !important; }
.blocklyTreeSelected .blocklyTreeLabel { color: #e2e8f0 !important; }

/* Flyout */
.blocklyFlyoutBackground { fill: #141921 !important; opacity: 1 !important; }

/* ── Block text ───────────────────────────────────────────────────────────────
   Force text to black everywhere — readable on all block colours.
   1px stroke = subtle dark halo, keeps emoji visible near dark block edges.
   paint-order: stroke fill ensures stroke draws BEHIND the fill, not over it.
*/
.blocklyText {
  fill: #000000 !important;
  paint-order: stroke fill !important;
  stroke: rgba(0, 0, 0, 0.35) !important;
  stroke-width: 1px !important;
  stroke-linejoin: round !important;
}
.blocklyEditableText text,
.blocklyNonEditableText text {
  fill: #000000 !important;
  paint-order: stroke fill !important;
  stroke: rgba(0, 0, 0, 0.35) !important;
  stroke-width: 1px !important;
  stroke-linejoin: round !important;
}

/* Tooltip */
.blocklyTooltipDiv {
  z-index: 99999 !important;
  max-width: 360px !important;
  white-space: pre-line !important;
  background: #1c2433 !important;
  color: #e2e8f0 !important;
  border: 1px solid #4a9eff !important;
  border-radius: 8px !important;
  padding: 10px 14px !important;
  font-size: 0.74rem !important;
  font-family: 'Inter', sans-serif !important;
  line-height: 1.6 !important;
  box-shadow: 0 8px 24px rgba(0,0,0,0.7) !important;
  pointer-events: none !important;
}

/* ── Responsive ──────────────────────────────────────────────────────────────── */
@media (max-width: 1100px) {
  .output-panel { width: 360px; }
  #scriptName   { width: 110px; }
}

/* ── Help documentation ─────────────────────────────────────────────────────── */
.help-doc {
  flex: 1;
  overflow: auto;
  padding: 14px;
  color: var(--text-secondary);
  font-size: 0.78rem;
  line-height: 1.55;
}
.help-doc::-webkit-scrollbar        { width: 5px; height: 5px; }
.help-doc::-webkit-scrollbar-track  { background: transparent; }
.help-doc::-webkit-scrollbar-thumb  { background: var(--border-muted); border-radius: 3px; }
.help-doc::-webkit-scrollbar-thumb:hover { background: var(--border-focus); }

.help-hero,
.help-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 10px;
  padding: 13px 14px;
  margin-bottom: 12px;
}
.help-hero {
  background:
    radial-gradient(circle at top right, rgba(96,184,255,0.12), transparent 45%),
    linear-gradient(180deg, var(--bg-raised), var(--bg-surface));
  border-color: var(--border-muted);
}
.help-kicker {
  color: var(--accent-bright);
  font-size: 0.64rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.help-hero h2,
.help-card h3 {
  color: var(--text-primary);
  margin: 0 0 8px;
  font-size: 0.94rem;
  line-height: 1.25;
}
.help-card h4 {
  color: var(--text-primary);
  margin: 0 0 6px;
  font-size: 0.78rem;
}
.help-hero p,
.help-card p { margin: 0 0 8px; }
.help-card p:last-child { margin-bottom: 0; }

.help-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}
.help-grid .help-card { margin-bottom: 0; }

.help-card ul,
.help-card ol {
  padding-left: 18px;
  margin: 0;
}
.help-card li { margin: 5px 0; }
.help-card strong { color: var(--text-primary); font-weight: 600; }
.help-card em { color: var(--accent-bright); font-style: normal; }
.help-card code,
.help-tags code {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-code);
  background: var(--bg-base);
  border: 1px solid var(--border-subtle);
  border-radius: 5px;
  padding: 1px 5px;
}

.help-steps {
  counter-reset: help-step;
  list-style: none;
  padding-left: 0 !important;
}
.help-steps li {
  position: relative;
  padding-left: 28px;
}
.help-steps li::before {
  counter-increment: help-step;
  content: counter(help-step);
  position: absolute;
  left: 0;
  top: 2px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent-glow);
  color: var(--accent-bright);
  border: 1px solid rgba(96,184,255,0.28);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.62rem;
  font-weight: 700;
}

.help-tags {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 7px 10px;
  align-items: center;
}
.help-tags span { color: var(--text-secondary); }

.help-category-list {
  display: grid;
  gap: 8px;
}
.help-category-list div {
  border-left: 3px solid var(--c, var(--border-muted));
  background: rgba(255,255,255,0.018);
  border-radius: 6px;
  padding: 7px 9px;
}
.help-category-list span {
  color: var(--text-primary);
  font-weight: 700;
}
.help-category-list p {
  margin: 3px 0 0;
  color: var(--text-secondary);
}

.help-do-dont {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.help-do-dont > div {
  background: var(--bg-base);
  border: 1px solid var(--border-subtle);
  border-radius: 8px;
  padding: 10px;
}
.help-note {
  color: var(--text-muted);
  border-top: 1px solid var(--border-subtle);
  padding-top: 8px;
}

@media (max-width: 1180px) {
  .help-grid,
  .help-do-dont { grid-template-columns: 1fr; }
}

</style>
</head>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
  <div class="brand">
    <div class="brand-title">
      <h1>⚙ StarMade NPC Creator</h1>
      <div class="subtitle" data-i18n="Visual Lua dialog builder">Visual Lua dialog builder</div>
    </div>
  </div>

  <div class="hdivider"></div>

  <div class="script-name-wrap">
    <label for="scriptName" data-i18n="Script">Script</label>
    <input id="scriptName" type="text" value="my-npc" placeholder="my-npc" autocomplete="off" spellcheck="false" />
  </div>

  <div class="hdivider"></div>

  <select id="exampleSelect" title="Load an example" data-i18n-title="Load an example">
    <optgroup label="── Basic" data-i18n-label="── Basic">
      <option value="welcome_kiosk" data-i18n="📋 Welcome Kiosk">📋 Welcome Kiosk</option>
      <option value="toll_booth" data-i18n="🚧 Toll Booth">🚧 Toll Booth</option>
    </optgroup>
    <optgroup label="── Intermediate" data-i18n-label="── Intermediate">
      <option value="crew_recruiter" data-i18n="👥 Crew Recruiter">👥 Crew Recruiter</option>
    </optgroup>
    <optgroup label="── Advanced" data-i18n-label="── Advanced">
      <option value="delivery_quest" data-i18n="📜 Delivery Quest">📜 Delivery Quest</option>
      <option value="reputation_shop" data-i18n="⭐ Reputation Shop">⭐ Reputation Shop</option>
    </optgroup>
    <optgroup label="── Very Advanced" data-i18n-label="── Very Advanced">
      <option value="guild_faction_hub" data-i18n="🏛 Guild Faction Hub">🏛 Guild Faction Hub</option>
    </optgroup>
  </select>
  <button class="btn btn-secondary" onclick="loadExample(document.getElementById('exampleSelect').value)" data-i18n="Load example">Load example</button>

  <div class="hdivider"></div>

  <button class="btn btn-secondary" onclick="importWorkspace()" data-i18n="📥 Import">📥 Import</button>
  <button class="btn btn-secondary" onclick="exportWorkspace()" data-i18n="📤 Export">📤 Export</button>
  <button class="btn btn-secondary" onclick="clearWorkspace()" data-i18n="🗑 Clear">🗑 Clear</button>

  <div class="spacer"></div>

  <div class="script-name-wrap">
    <label for="languageSelect" data-i18n="Language">Language</label>
    <select id="languageSelect" title="Language" data-i18n-title="Language">
      <option value="en" data-i18n="English">English</option>
      <option value="fr" data-i18n="Français">Français</option>
      <option value="de" data-i18n="German">Deutsch</option>
      <option value="es" data-i18n="Spanish">Español</option>
      <option value="ru" data-i18n="Russian">Русский</option>
      <option value="ja" data-i18n="Japanese">日本語</option>
    </select>
  </div>

  <button class="btn btn-success" onclick="copyLua()" data-i18n="📋 Copy Lua">📋 Copy Lua</button>
  <button class="btn btn-success" onclick="downloadLua()" data-i18n="⬇ Download">⬇ Download</button>

  <input type="file" id="fileInput" accept=".json,.lua" style="display:none" onchange="onFileLoad(event)" />
</header>

<!-- ── Main ────────────────────────────────────────────────────────────────── -->
<div class="main">
  <div id="blocklyDiv"></div>

  <div class="output-panel">
    <div class="output-tabs">
      <div class="tab active" onclick="showTab('lua')" data-i18n="Lua Output">Lua Output</div>
      <div class="tab"       onclick="showTab('help')" data-i18n="Help">Help</div>
    </div>

    <div class="tab-content active" id="tab-lua">
      <pre id="luaOutput" data-i18n="-- Drag blocks from the toolbox to build your NPC dialog.">-- Drag blocks from the toolbox to build your NPC dialog.</pre>
    </div>

    <div class="tab-content" id="tab-help">
      <div id="helpOutput" class="help-doc"></div>
    </div>

    <div id="statusBar" data-i18n="Ready — drag blocks from the toolbox.">Ready — drag blocks from the toolbox.</div>
  </div>
</div>

<div id="copyBadge" data-i18n="✓ Copied!">✓ Copied!</div>

0442\u0435\u0448\u0435\u0441\u0442\u0432\u043E\u0432\u0430\u0442\u044C \u043C\u0435\u0436\u0434\u0443 \u0441\u0435\u043A\u0442\u043E\u0440\u0430\u043C\u0438?","Use a Jump Drive or the faction portal on level 1.":"\u0418\u0441\u043F\u043E\u043B\u044C\u0437\u0443\u0439\u0442\u0435 Jump Drive \u0438\u043B\u0438 \u043F\u043E\u0440\u0442\u0430\u043B \u0444\u0440\u0430\u043A\u0446\u0438\u0438 \u043D\u0430 \u0443\u0440\u043E\u0432\u043D\u0435 1.","Portals are free for faction members. Others pay 5 000 credits.":"\u041F\u043E\u0440\u0442\u0430\u043B\u044B \u0431\u0435\u0441\u043F\u043B\u0430\u0442\u043D\u044B \u0434\u043B\u044F \u0447\u043B\u0435\u043D\u043E\u0432 \u0444\u0440\u0430\u043A\u0446\u0438\u0438. \u0414\u0440\u0443\u0433\u0438\u0435 \u043F\u043B\u0430\u0442\u044F\u0442 5 000 \u043A\u0440\u0435\u0434\u0438\u0442\u043E\u0432.","What services does the station offer?":"\u041A\u0430\u043A\u0438\u0435 \u0443\u0441\u043B\u0443\u0433\u0438 \u043F\u0440\u0435\u0434\u043B\u0430\u0433\u0430\u0435\u0442 \u0441\u0442\u0430\u043D\u0446\u0438\u044F?","We offer trade, crew hiring, and mission dispatch.":"\u041C\u044B \u043F\u0440\u0435\u0434\u043B\u0430\u0433\u0430\u0435\u043C \u0442\u043E\u0440\u0433\u043E\u0432\u043B\u044E, \u043D\u0430\u0439\u043C \u044D\u043A\u0438\u043F\u0430\u0436\u0430 \u0438 \u043E\u0442\u043F\u0440\u0430\u0432\u043A\u0443 \u043C\u0438\u0441\u0441\u0438\u0439.","Trade.":"\u0422\u043E\u0440\u0433\u043E\u0432\u043B\u044F.","The market is on level 3, open 24/7.":"\u0420\u044B\u043D\u043E\u043A \u043D\u0430\u0445\u043E\u0434\u0438\u0442\u0441\u044F \u043D\u0430 \u0443\u0440\u043E\u0432\u043D\u0435 3, \u043E\u0442\u043A\u0440\u044B\u0442 \u043A\u0440\u0443\u0433\u043B\u043E\u0441\u0443\u0442\u043E\u0447\u043D\u043E \u0438 \u0431\u0435\u0437 \u0432\u044B\u0445\u043E\u0434\u043D\u044B\u0445.","Crew hiring.":"\u041D\u0430\u0435\u043C \u044D\u043A\u0438\u043F\u0430\u0436\u0430.","The crew office is on level 2. We hire pilots, engineers and gunners.":"\u041E\u0444 4F\u0442\u0441\u044F \u043F\u043E \u043A\u043E\u043E\u0440\u0434\u0438\u043D\u0430\u0442\u0430\u043C 10, 0, 5. \u0418\u0445 \u043D\u0435\u043B\u044C\u0437\u044F \u043F\u0440\u043E\u043F\u0443\u0441\u0442\u0438\u0442\u044C.","What's beyond the gate?":"\u0427\u0442\u043E \u0437\u0430 \u0432\u043E\u0440\u043E\u0442\u0430\u043C\u0438?","The restricted research lab. Authorised personnel only.":"\u0417\u0430\u043A\u0440\u044B\u0442\u0430\u044F \u0438\u0441\u0441\u043B\u0435\u0434\u043E\u0432\u0430\u0442\u0435\u043B\u044C\u0441\u043A\u0430\u044F \u043B\u0430\u0431\u043E\u0440\u0430\u0442\u043E\u0440\u0438\u044F. \u0422\u043E\u043B\u044C\u043A\u043E \u0430\u0432\u0442\u043E\u0440\u0438\u0437\u043E\u0432\u0430\u043D\u043D\u044B\u0439 \u043F\u0435\u0440\u0441\u043E\u043D\u0430\u043B.","Farewell.":"\u041F\u0440\u043E\u0449\u0430\u0439.","Greetings, {name}! I'm {partner}, crew recruitment officer for {faction}.":"\u041F\u0440\u0438\u0432\u0435\u0442\u0441\u0442\u0432\u0443\u044E, {name}! \u042F {partner}, \u0441\u043F\u0435\u0446\u0438\u0430\u043B\u0438\u0441\u0442 \u043F\u043E \u043F\u043E\u0434\u0431\u043E\u0440\u0443 \u044D\u043A\u0438\u043F\u0430\u0436\u0430 {faction}.","I'd like to hire you (50 000 cr).":"\u042F \u0445\u043E\u0442\u0435\u043B \u0431\u044B \u043D\u0430\u043D\u044F\u0442\u044C \u0432\u0430\u0441 (50 000 \u043A\u0440).","Welcome aboard, Commander! Your crew now has a new member.":"\u0414\u043E\u0431\u0440\u043E \u043F\u043E\u0436\u0430\u043B\u043E\u0432\u0430\u0442\u044C \u043D\u0430 \u0431\u043E\u0440\u0442, \u043A\u043E\u043C\u0430\u043D\u0434\u0438\u0440! \u0412 \u0432\u0430\u0448\u0435\u0439 \u043A\u043E\u043C\u0430\u043D\u0434\u0435 \u043F\u043E\u044F\u0432\u0438\u043B\u0441\u044F \u043D\u043E\u0432\u044B\u0439 \u0443\u0447\u0430\u0441\u0442\u043D\u0438\u043A.","Your crew is already full. Dismiss someone first.":"\u0412\u0430\u0448\u0430 \u043A\u043E\u043C\u0430\u043D\u0434\u0430 \u0443\u0436\u0435 \u0437\u0430\u043F\u043E\u043B\u043D\u0435\u043D\u0430. \u0421\u043D\u0430\u0447\u0430\u043B\u0430 \u0443\u0432\u043E\u043B\u0438\u0442\u0435 \u043A\u043E\u0433\u043E-\u043D\u0438\u0431\u0443\u0434\u044C.","We cannot serve different factions, Commander.":"\u041C\u044B \u043D\u0435 \u043C\u043E\u0436\u0435\u043C \u0441\u043B\u0443\u0436\u0438\u0442\u044C \u0440\u0430\u0437\u043D\u044B\u043C \u0444\u0440\u0430\u043A\u0446\u0438\u044F\u043C, \u043A\u043E\u043C\u0430\u043D\u0434\u0443\u044E\u0449\u0438\u0439.","Dismiss you from my crew.":"\u0423\u0432\u043E\u043B\u0438\u0442\u044C \u0442\u0435\u0431\u044F \u0438\u0437 \u043C\u043E\u0435\u0439 \u043A\u043E\u043C\u0430\u043D\u0434\u044B.","Are you sure you want to dismiss this crew member?":"\u0412\u044B \u0443\u0432\u0435\u0440\u0435\u043D\u044B, \u0447\u0442\u043E \u0445\u043E\u0442\u0438\u0442\u0435 \u0443\u0432\u043E\u043B\u0438\u0442\u044C \u044D\u0442\u043E\u0433\u043E \u0447\u043B\u0435\u043D\u0430 \u044D\u043A\u0438\u043F\u0430\u0436\u0430?","Yes, dismiss.":"\u0414\u0430, \u0443\u0432\u043E\u043B\u0438\u0442\u044C.","No, keep them.":"\u041D\u0435\u0442, \u043E\u0441\u0442\u0430\u0432\u044C \u0438\u0445.","Crew member dismissed. Farewell.":"\u0427\u043B\u0435\u043D \u044D\u043A\u0438\u043F\u0430\u0436\u0430 \u0443\u0432\u043E\u043B\u0435\u043D. \u041F\u0440\u043E\u0449\u0430\u043D\u0438\u0435.","This crew member is not assigned to your crew.":"\u042D\u0442\u043E\u0442 \u0447\u043B\u0435\u043D \u044D\u043A\u0438\u043F\u0430\u0436\u0430 \u043D\u0435 \u0437\u0430\u043A\u0440\u0435\u043F\u043B\u0435\u043D \u0437\u0430 \u0432\u0430\u0448\u0438\u043C \u044D\u043A\u0438\u043F\u0430\u0436\u0435\u043C.","Spawn additional crew (25 000 cr).":"\u0421\u043E\u0437\u0434\u0430\u0442\u044C \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u044B\u0439 \u044D\u043A\u0438\u043F\u0430\u0436 (25 000 \u043A\u0440).","New crew member dispatched to your ship.":"\u041D\u0430 \u0432\u0430\u0448 \u043A\u043E\u0440\u0430\u0431\u043B\u044C \u043E\u0442\u043F\u0440\u0430\u0432\u043B\u0435\u043D \u043D\u043E\u0432\u044B\u0439 \u0447\u043B\u0435\u043D \u044D\u043A\u0438\u043F\u0430\u0436\u0430.","You don't have 25 000 credits for this.":"\u0414\u043B\u044F \u044D\u0442\u043E\u0433\u043E \u0443 \u0432\u0430\u0441 \u043D\u0435\u0442 25 000 \u043A\u0440\u0435\u0434\u0438\u0442\u043E\u0432.","Your crew complement is full.":"\u0412\u0430\u0448 \u044D\u043A\u0438\u043F\u0430\u0436 \u043F\u043E\u043B\u043E\u043D.","What's my current reputation?":"\u041A\u0430\u043A\u043E\u0432\u0430 \u043C\u043E\u044F \u0442\u0435\u043A\u0443\u0449\u0430\u044F \u0440\u0435\u043F\u0443\u0442\u0430\u0446\u0438\u044F?","Your guild standing: %s reputation points.":"\u0420\u0435\u043F\u0443\u0442\u0430\u0446\u0438\u044F \u0432\u0430\u0448\u0435\u0439 \u0433\u0438\u043B\u044C\u0434\u0438\u0438: %s \u043E\u0447\u043A\u043E\u0432 \u0440\u0435\u043F\u0443\u0442\u0430\u0446\u0438\u0438.","Goodbye.":"\u0414\u043E \u0441\u0432\u0438\u0434\u0430\u043D\u0438\u044F.","Greetings {name}! I'm {partner}, guild quartermaster.":"\u041F\u0440\u0438\u0432\u0435\u0442\u0441\u0442\u0432\u0443\u044E {name}! \u042F {partner}, \u0438\u043D\u0442\u0435\u043D\u0434\u0430\u043D\u0442 \u0433\u0438\u043B\u044C\u0434\u0438\u0438.","Tell me about the delivery mission.":"\u0420\u0430\u0441\u0441\u043A\u0430\u0436\u0438 \u043C\u043D\u0435 \u043E \u043C\u0438\u0441\u0441\u0438\u0438 \u043F\u043E \u0434\u043E\u0441\u0442\u0430\u0432\u043A\u0435.","We need 3 crates delivered to sector 7. Reward: 25 000 credits.":"\u041D\u0430\u043C \u043D\u0443\u0436\u043D\u043E \u0434\u043E\u0441\u0442\u0430\u0432\u0438\u0442\u044C 3 \u044F\u0449\u0438\u043A\u0430 \u0432 \u0441\u0435\u043A\u0442\u043E\u0440 7. \u041D\u0430\u0433\u0440\u0430\u0434\u0430: 25 000 \u043A\u0440\u0435\u0434\u0438\u0442\u043E\u0432.","I'll do it!":"\u042F \u0441\u0434\u0435\u043B\u0430\u044E \u044D\u0442\u043E!","Objective: Collect the 3 crates from the cargo bay and fly to sector 7.":"\u0426\u0435\u043B\u044C: \u0437\u0430\u0431\u0440\u0430\u0442\u044C 3 \u044F\u0449\u0438\u043A\u0430 \u0438\u0437 \u0433\u0440\u0443\u0437\u043E\u0432\u043E\u0433\u043E \u043E\u0442\u0441\u0435\u043A\u0430 \u0438 \u043B\u0435\u0442\u0435\u0442\u044C \u0432 \u0441\u0435\u043A\u0442\u043E\u0440 7.","Come back when you're ready.":"\u0412\u043E\u0437\u0432\u0440\u0430\u0449\u0430\u0439\u0441\u044F, \u043A\u043E\u0433\u0434\u0430 \u0431\u0443\u0434\u0435\u0448\u044C \u0433\u043E\u0442\u043E\u0432.","You already have this mission active. Deliver the crates to sector 7!":"\u0423 \u0432\u0430\u0441 \u0443\u0436\u0435 \u0435\u0441\u0442\u044C \u044D\u0442\u0430 \u043C\u0438\u0441\u0441\u0438\u044F. \u0414\u043E\u0441\u0442\u0430\u0432\u044C\u0442\u0435 \u044F\u0449\u0438\u043A\u0438 \u0432 \u0441\u0435\u043A\u0442\u043E\u0440 7!","You've already completed this mission. Thank you, Commander!":"\u0412\u044B \u0443\u0436\u0435 \u0432\u044B\u043F\u043E\u043B\u043D\u0438\u043B\u0438 \u044D\u0442\u0443 \u043C\u0438\u0441\u0441\u0438\u044E. \u0421\u043F\u0430\u0441\u0438\u0431\u043E, \u041A\u043E\u043C\u0430\u043D\u0434\u0438\u0440!","I've delivered the crates.":"\u042F \u0434\u043E\u0441\u0442\u0430\u0432\u0438\u043B \u044F\u0449\u0438\u043A\u0438.","Excellent work! Here's your payment and a reputation bonus.":"\u041E\u0442\u043B\u0438\u0447\u043D\u0430\u044F \u0440\u0430\u0431\u043E\u0442\u0430! \u0412\u043E\u0442 \u0432\u0430\u0448\u0430 \u043E\u043F\u043B\u0430\u0442\u0430 \u0438 \u0431\u043E\u043D\u0443\u0441 \u0437\u0430 \u0440\u0435\u043F\u0443\u0442\u0430\u0446\u0438\u044E.","You haven't reached sector 7 yet. The crates must be delivered there.":"\u0412\u044B \u0435\u0449\u0435 \u043D\u0435 \u0434\u043E\u0441\u0442\u0438\u0433\u043B\u0438 \u0441\u0435\u043A\u0442\u043E\u0440\u0430 7. \u042F\u0449\u0438\u043A\u0438 \u0434\u043E\u043B\u0436\u043D\u044B \u0431\u044B\u0442\u044C \u0434\u043E\u0441\u0442\u0430\u0432\u043B\u0435\u043D\u044B \u0442\u0443\u0434\u0430.","You don't have an active delivery mission.":"\u0423 \u0432\u0430\u0441 \u043D\u0435\u0442 \u0430\u043A\u0442\u0438\u0432\u043D\u043E\u0439 \u043C\u0438\u0441\u0441\u0438\u0438 \u043F\u043E \u0434\u043E\u0441\u0442\u0430\u0432\u043A\u0435.","I need to abandon the mission.":"\u041C\u043D\u0435 \u043D\u0443\u0436\u043D\u043E \u043E\u0442\u043A\u0430\u0437\u0430\u0442\u044C\u0441\u044F \u043E\u0442 \u043C\u0438\u0441\u0441\u0438\u0438.","Are you sure? You will lose all progress.":"\u0412\u044B \u0443\u0432\u0435\u0440\u0435\u043D\u044B? \u0412\u044B \u043F\u043E\u0442\u0435\u0440\u044F\u0435\u0442\u0435 \u0432\u0435\u0441\u044C \u043F\u0440\u043E\u0433\u0440\u0435\u0441\u0441.","Yes, abandon.":"\u0414\u0430, \u043E\u0441\u0442\u0430\u0432\u0438\u0442\u044C.","No, I'll finish it.":"\u041D\u0435\u0442, \u044F \u0437\u0430\u043A\u043E\u043D\u0447\u0443.","You don't have an active mission to abandon.":"\u0423 \u0432\u0430\u0441 \u043D\u0435\u0442 \u0430\u043A\u0442\u0438\u0432\u043D\u043E\u0439 \u043C\u0438\u0441\u0441\u0438\u0438, \u043A\u043E\u0442\u043E\u0440\u0443\u044E \u043C\u043E\u0436\u043D\u043E \u0431\u044B\u043B\u043E \u0431\u044B \u043E\u0442\u043C\u0435\u043D\u0438\u0442\u044C.","Welcome, {name}. My wares are reserved for trusted members of {faction}.":"\u0414\u043E\u0431\u0440\u043E \u043F\u043E\u0436\u0430\u043B\u043E\u0432\u0430\u0442\u044C, {name}. \u041C\u043E\u0438 \u0442\u043E\u0432\u0430\u0440\u044B \u043F\u0440\u0435\u0434\u043D\u0430\u0437\u043D\u0430\u0447\u0435\u043D\u044B \u0434\u043B\u044F \u0434\u043E\u0432\u0435\u0440\u0435\u043D\u043D\u044B\u0445 \u0447\u043B\u0435\u043D\u043E\u0432 {faction}.","Show me your exclusive items.":"\u041F\u043E\u043A\u0430\u0436\u0438\u0442\u0435 \u043C\u043D\u0435 \u0441\u0432\u043E\u0438 \u044D\u043A\u0441\u043A\u043B\u044E\u0437\u0438\u0432\u043D\u044B\u0435 \u0432\u0435\u0449\u0438.","Excellent standing, {name}. Here is our exclusive catalog.":"\u041E\u0442\u043B\u0438\u0447\u043D\u0430\u044F \u0440\u0435\u043F\u0443\u0442\u0430\u0446\u0438\u044F, {name}. \u0412\u043E\u0442 \u d out.":"\u0423\u043B\u0443\u0447\u0448\u0435\u043D\u0438\u044F \u0449\u0438\u0442\u0430 \u0440\u0430\u0441\u043F\u0440\u043E\u0434\u0430\u043D\u044B.","Restock the shop (admin only).":"\u041F\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435 \u0437\u0430\u043F\u0430\u0441\u044B \u0432 \u043C\u0430\u0433\u0430\u0437\u0438\u043D\u0435 (\u0442\u043E\u043B\u044C\u043A\u043E \u0434\u043B\u044F \u0430\u0434\u043C\u0438\u043D\u0438\u0441\u0442\u0440\u0430\u0442\u043E\u0440\u0430).","Laser stock +3.":"\u041B\u0430\u0437\u0435\u0440\u043D\u044B\u0439 \u0437\u0430\u043F\u0430\u0441 +3.","Shield Upgrade stock +1.":"\u0417\u0430\u043F\u0430\u0441 \u0443\u043B\u0443\u0447\u0448\u0435\u043D\u0438\u044F \u0449\u0438\u0442\u0430 +1.","Nothing for now.":"\u041F\u043E\u043A\u0430 \u043D\u0438\u0447\u0435\u0433\u043E.","Your reputation with {faction} is too low. Earn 100 reputation to access this catalog.":"\u0412\u0430\u0448\u0430 \u0440\u0435\u043F\u0443\u0442\u0430\u0446\u0438\u044F \u0432 {faction} \u0441\u043B\u0438\u0448\u043A\u043E\u043C \u043D\u0438\u0437\u043A\u0430\u044F. \u0417\u0430\u0440\u0430\u0431\u043E\u0442\u0430\u0439\u0442\u0435 100 \u0440\u0435\u043F\u0443\u0442\u0430\u0446\u0438\u0438, \u0447\u0442\u043E\u0431\u044B \u043F\u043E\u043B\u0443\u0447\u0438\u0442\u044C \u0434\u043E\u0441\u0442\u0443\u043F \u043A \u044D\u0442\u043E\u043C\u0443 \u043A\u0430\u0442\u0430\u043B\u043E\u0433\u0443.","What's my reputation?":"\u041A\u0430\u043A\u043E\u0432\u0430 \u043C\u043E\u044F \u0440\u0435\u043F\u0443\u0442\u0430\u0446\u0438\u044F?","Your {faction} standing: %s reputation points.":"\u0412\u0430\u0448\u0430 \u0440\u0435\u043F\u0443\u0442\u0430\u0446\u0438\u044F {faction}: %s \u043E\u0447\u043A\u043E\u0432 \u0440\u0435\u043F\u0443\u0442\u0430\u0446\u0438\u0438.","How do I earn reputation?":"\u041A\u0430\u043A \u043C\u043D\u0435 \u0437\u0430\u0440\u0430\u0431\u043E\u0442\u0430\u0442\u044C \u0440\u0435\u043F\u0443\u0442\u0430\u0446\u0438\u044E?","Complete delivery missions, purchase exclusive items and never betray the guild.":"\u0412\u044B\u043F\u043E\u043B\u043D\u044F\u0439\u0442\u0435 \u043C\u0438\u0441\u0441\u0438\u0438 \u043F\u043E \u0434\u043E\u0441\u0442\u0430\u0432\u043A\u0435, \u043F\u0440\u0438\u043E\u0431\u0440\u0435\u0442\u0430\u0439\u0442\u0435 \u044D\u043A\u0441\u043A\u043B\u044E\u0437\u0438\u0432\u043D\u044B\u0435 \u043F\u0440\u0435\u0434\u043C\u0435\u0442\u044B \u0438 \u043D\u0438\u043A\u043E\u0433\u0434\u0430 \u043D\u0435 \u043F\u0440\u0435\u0434\u0430\u0439\u0442\u0435 \u0433\u0438\u043B\u044C\u0434\u0438\u044E.","I'll be back.":"\u042F \u0432\u0435\u0440\u043D\u0443\u0441\u044C.","Welcome back, Commander {name}! The guild salutes you.":"\u0421 \u0432\u043E\u0437\u0432\u0440\u0430\u0449\u0435\u043D\u0438\u0435\u043C, \u043A\u043E\u043C\u0430\u043D\u0434\u0438\u0440 {name}! \u0413\u0438\u043B\u044C\u0434\u0438\u044F \u043F\u0440\u0438\u0432\u0435\u0442\u0441\u0442\u0432\u0443\u0435\u0442 \u0432\u0430\u0441.","Halt, stranger. You are not yet known to this guild.":"\u0421\u0442\u043E\u0439, \u043D\u0435\u0437\u043D\u0430\u043A\u043E\u043C\u0435\u0446. \u0412\u044B \u0435\u0449\u0435 \u043D\u0435 \u0438\u0437\u0432\u0435\u0441\u0442\u043D\u044B \u0432 \u044D\u0442\u043E\u0439 \u0433\u0438\u043B\u044C\u0434\u0438\u0438.","What do you have for me today?":"\u0427\u0442\u043E \u0443 \u0442\u0435\u0431\u044F \u0435\u0441\u0442\u044C \u0434\u043B\u044F \u043C\u0435\u043D\u044F \u0441\u0435\u0433\u043E\u0434\u043D\u044F?","I have several things for you today, Commander.":"\u0423 \u043C\u0435\u043D\u044F \u0435\u0441\u0442\u044C \u0434\u043B\u044F \u0432\u0430\u0441 \u043D\u0435\u0441\u043A\u043E\u043B\u044C\u043A\u043E \u0432\u0435\u0449\u0435\u0439 \u0441\u0435\u0433\u043E\u0434\u043D\u044F, \u043A\u043E\u043C\u043C\u0430\u043D\u0434\u0435\u0440.","[Daily] Collect loyalty bonus.":"[\u0415\u0436\u0435\u0434\u043D\u0435\u0432\u043D\u043E] \u0421\u043E\u0431\u0438\u0440\u0430\u0439\u0442\u0435 \u0431\u043E\u043D\u0443\u0441 \u043B\u04 rvey not complete yet. Fly to sector 12 first.":"\u041E\u043F\u0440\u043E\u0441 \u0435\u0449\u0435 \u043D\u0435 \u0437\u0430\u0432\u0435\u0440\u0448\u0435\u043D. \u0421\u043D\u0430\u0447\u0430\u043B\u0430 \u043B\u0435\u0442\u0438\u0442\u0435 \u0432 \u0441\u0435\u043A\u0442\u043E\u0440 12.","You've already completed the ore survey!":"\u0412\u044B \u0443\u0436\u0435 \u0437\u0430\u0432\u0435\u0440\u0448\u0438\u043B\u0438 \u0438\u0441\u0441\u043B\u0435\u0434\u043E\u0432\u0430\u043D\u0438\u0435 \u0440\u0443\u0434\u044B!","Access the Commander's vault.":"\u041F\u043E\u043B\u0443\u0447\u0438\u0442\u0435 \u0434\u043E\u0441\u0442\u0443\u043F \u043A \u0445\u0440\u0430\u043D\u0438\u043B\u0438\u0449\u0443 \u043A\u043E\u043C\u0430\u043D\u0434\u0438\u0440\u0430.","The vault is open to you, Commander.":"\u0425\u0440\u0430\u043D\u0438\u043B\u0438\u0449\u0435 \u043E\u0442\u043A\u0440\u044B\u0442\u043E \u0434\u043B\u044F \u0432\u0430\u0441, \u043A\u043E\u043C\u043C\u0430\u043D\u0434\u0435\u0440.","Buy Meta Blueprint (1 000 000 cr)":"\u041A\u0443\u043F\u0438\u0442\u044C Meta Blueprint (1 000 000 \u043A\u0440\u043E\u0440)","Purchase a Meta Blueprint for 1 000 000 credits?":"\u041A\u0443\u043F\u0438\u0442\u0435 Meta Blueprint \u0437\u0430 1 000 000 \u043A\u0440\u0435\u0434\u0438\u0442\u043E\u0432?","Yes, purchase.":"\u0414\u0430, \u043F\u043E\u043A\u0443\u043F\u043A\u0430.","Close vault.":"\u0417\u0430\u043A\u0440\u044B\u0442\u044C \u0445\u0440\u0430\u043D\u0438\u043B\u0438\u0449\u0435.","The vault requires 200 reputation AND the ore survey completion.":"\u0425\u0440\u0430\u043D\u0438\u043B\u0438\u0449\u0435 \u0442\u0440\u0435\u0431\u0443\u0435\u0442 200 \u0440\u0435\u043F\u0443\u0442\u0430\u0446\u0438\u0438 \u0418 \u0437\u0430\u0432\u0435\u0440\u0448\u0435\u043D\u0438\u0435 \u0438\u0441\u0441\u043B\u0435\u0434\u043E\u0432\u0430\u043D\u0438\u044F \u0440\u0443\u0434\u044B.","What's happening in the sector?":"\u0427\u0442\u043E \u043F\u0440\u043E\u0438\u0441\u0445\u043E\u0434\u0438\u0442         <section class="help-hero">
          <div class="help-kicker">Integrated guide</div>
          <h2>StarMade NPC Creator Help</h2>
          <p>Build NPC dialog trees visually, generate Lua automatically, then import the Lua back without losing structure when possible.</p>
        </section>

        <section class="help-card">
          <h3>🚀 Quick workflow</h3>
          <ol class="help-steps">
            <li><strong>Start with a Greeting</strong> block — it is the mandatory root entry of the dialog.</li>
            <li><strong>Add Choice</strong> blocks under the greeting to give the player options.</li>
            <li><strong>Attach actions</strong> inside choices: hire crew, give items, quests, reputation, cooldowns…</li>
            <li><strong>Read the Lua Output</strong> panel on the right — it updates live after every edit.</li>
            <li><strong>Export JSON</strong> to save an editable project, or <strong>Download Lua</strong> to deploy to StarMade.</li>
          </ol>
        </section>

        <section class="help-grid">
          <article class="help-card">
            <h3>📋 Dialog basics</h3>
            <ul>
              <li><strong>Greeting</strong> — required root node.</li>
              <li><strong>Choice</strong> — player button leading to actions or a sub-menu.</li>
              <li><strong>Say</strong> — NPC text, auto-advances to the next block after the timer.</li>
              <li><strong>Say with choices</strong> — creates a sub-menu anywhere in a branch.</li>
              <li><strong>Confirm</strong> — prompts Yes / No before a sensitive action.</li>
              <li><strong>Go Back</strong> — returns the player to the parent dialog node.</li>
            </ul>
          </article>

          <article class="help-card">
            <h3>✅ Branches vs 🧩 Expressions</h3>
            <ul>
              <li><strong>Branches</strong> are action blocks with THEN / ELSE outputs (readable, self-contained).</li>
              <li><strong>Expressions</strong> are composable condition pieces that plug into <em>If Condition</em>.</li>
              <li>Combine expressions with AND / OR / NOT for complex conditions.</li>
              <li>Use branches for simple checks; expressions for composed logic.</li>
            </ul>
          </article>

          <article class="help-card">
            <h3>🧮 Variables</h3>
            <ul>
              <li><strong>Variable</strong> blocks are floating Lua constant declarations.</li>
              <li><strong>Var Reference</strong> connects a variable to a numeric field (prices, amounts, coordinates).</li>
              <li>Missing references produce a blocking warning before Lua generation.</li>
              <li>Variables are placed on the workspace, not inside the dialog tree.</li>
            </ul>
          </article>

          <article class="help-card">
            <h3>💬 Text placeholders</h3>
            <div class="help-tags">
              <code>{name}</code><span>NPC name</span>
              <code>{partner}</code><span>NPC affinity</span>
              <code>{faction}</code><span>faction name</span>
              <code>{owner}</code><span>commander name</span>
              <code>{self}</code><span>player name</span>
            </div>
            <p style="margin-top:8px;font-size:0.78rem;color:var(--text-secondary)">Use <code>%s</code> in Say with Value / Get Info to display a live stat.</p>
          </article>
        </section>

        <section class="help-card">
          <h3>🗂 Block categories — quick reference</h3>
          <div class="help-category-list">
            <div>
              <span style="--c:#1565c0">📋 Dialog</span>
              <p>Greeting (root), Say, Say with Choices, Say + Value, Confirm, Choice, Go Back.</p>
            </div>
            <div>
              <span style="--c:#6a1b9a">🧮 Variables</span>
              <p>Floating Lua constants and Var Reference inputs for prices, counts and coordinates.</p>
            </div>
            <div>
              <span style="--c:#1b5e20">👥 Crew</span>
              <p>Hire (with price), Unhire, Spawn Crew — all with full reaction branches.</p>
            </div>
            <div>
              <span style="--c:#d84315">🛒 Items</span>
              <p>Give Credits, Take Item, Give Type, Sell Item, Give Meta Item, Check Inventory, Send Message.</p>
            </div>
            <div>
              <span style="--c:#283593">⚡ World</span>
              <p>Activate Block, Move NPC, Destroy Ship, Give Gravity, Call Tutorial.</p>
            </div>
            <div>
              <span style="--c:#546e7a">🔗 Sequences</span>
              <p>Auto Sequence, Wait Until (polling), Delayed Follow-Up.</p>
            </div>
            <div>
              <span style="--c:#006064">💾 SQLite / Memory</span>
              <p>Memory Set/Increment, SQLite Get/Set/Increment — backed by the StarMade HSQLDB driver.</p>
            </div>
            <div>
              <span style="--c:#b71c1c">📜 Quests</span>
              <p>Advanced Quest Offer (state-aware), Quest Offer, Start, Set Step, Require Status/Step, Objective, Reward, Complete, Fail.</p>
