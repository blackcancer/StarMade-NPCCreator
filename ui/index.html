<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarMade NPC Creator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/blockly@10.4.3/blockly.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   StarMade NPC Creator — Design System
   ═══════════════════════════════════════════════════════════════════════════ */

/* ── Design tokens ──────────────────────────────────────────────────────────── */
:root {
  --bg-base:       #0e1117;
  --bg-surface:    #141921;
  --bg-raised:     #1c2433;
  --bg-hover:      #243044;
  --bg-active:     #2d3d56;

  --border-subtle: #1f2d40;
  --border-muted:  #2a3d55;
  --border-focus:  #4a9eff;

  --text-primary:  #e2e8f0;
  --text-secondary:#8a9bb5;
  --text-muted:    #4a5a72;
  --text-code:     #cdd5e0;

  --accent:        #3b9eff;
  --accent-bright: #60b8ff;
  --accent-glow:   rgba(59,158,255,0.15);

  --success:       #34d399;
  --success-bg:    #0d3a28;

  --lua-kw:        #c792ea;
  --lua-str:       #a8e6a3;
  --lua-cmt:       #4a5a72;
  --lua-num:       #ffcb6b;

  --font-ui:   'Inter', 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;

  --radius-md: 7px;
  --t-fast:    120ms ease;
}

/* ── Reset ───────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-ui);
  background: var(--bg-base);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ──────────────────────────────────────────────────────────────────── */
header {
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-subtle);
  padding: 0 14px;
  height: 48px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  z-index: 10;
}

/* Brand — title + subtitle stacked */
.brand { display: flex; align-items: center; flex-shrink: 0; }
.brand-title { display: flex; flex-direction: column; gap: 1px; }

.brand h1 {
  font-size: 0.88rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--text-primary);
  white-space: nowrap;
  line-height: 1.1;
}
.brand h1 span { color: var(--accent-bright); }

.subtitle {
  font-size: 0.65rem;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  white-space: nowrap;
  line-height: 1.1;
}

.hdivider {
  width: 1px;
  height: 18px;
  background: var(--border-muted);
  flex-shrink: 0;
  margin: 0 3px;
}

.spacer { flex: 1; }

/* Script name */
.script-name-wrap { display: flex; align-items: center; gap: 5px; }
.script-name-wrap label {
  font-size: 0.66rem;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
}
#scriptName {
  background: var(--bg-raised);
  border: 1px solid var(--border-muted);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  padding: 4px 9px;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  width: 140px;
  outline: none;
  transition: border-color var(--t-fast), box-shadow var(--t-fast);
}
#scriptName:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

/* Example selector */
#exampleSelect {
  background: var(--bg-raised);
  border: 1px solid var(--border-muted);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  padding: 4px 7px;
  font-size: 0.76rem;
  cursor: pointer;
  outline: none;
  max-width: 160px;
  transition: border-color var(--t-fast);
}
#exampleSelect:hover, #exampleSelect:focus {
  border-color: var(--border-focus);
}

/* ── Buttons ─────────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 11px;
  border: 1px solid transparent;
  border-radius: var(--radius-md);
  font-family: var(--font-ui);
  font-size: 0.76rem;
  font-weight: 500;
  cursor: pointer;
  transition: background var(--t-fast), border-color var(--t-fast), color var(--t-fast);
  white-space: nowrap;
  outline: none;
}

.btn-secondary {
  background: transparent;
  border-color: var(--border-muted);
  color: var(--text-secondary);
}
.btn-secondary:hover {
  background: var(--bg-hover);
  border-color: var(--border-focus);
  color: var(--text-primary);
}

.btn-success {
  background: var(--success-bg);
  border-color: var(--success);
  color: var(--success);
  font-weight: 600;
}
.btn-success:hover {
  background: var(--success);
  color: #071f15;
}

/* ── Layout ──────────────────────────────────────────────────────────────────── */
.main { display: flex; flex: 1; overflow: hidden; }
#blocklyDiv { flex: 1; height: 100%; }

/* ── Output panel ────────────────────────────────────────────────────────────── */
.output-panel {
  width: 420px;
  background: var(--bg-base);
  border-left: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.output-tabs {
  display: flex;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
}
.tab {
  padding: 11px 18px;
  font-size: 0.76rem;
  font-weight: 500;
  cursor: pointer;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  transition: color var(--t-fast), border-color var(--t-fast);
  user-select: none;
}
.tab:hover  { color: var(--text-secondary); }
.tab.active { color: var(--accent-bright); border-bottom-color: var(--accent); }

.tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.tab-content.active { display: flex; }

pre#luaOutput {
  flex: 1;
  overflow: auto;
  padding: 14px 16px;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  line-height: 1.7;
  color: var(--text-code);
  white-space: pre;
}
pre#luaOutput::-webkit-scrollbar        { width: 5px; height: 5px; }
pre#luaOutput::-webkit-scrollbar-track  { background: transparent; }
pre#luaOutput::-webkit-scrollbar-thumb  { background: var(--border-muted); border-radius: 3px; }
pre#luaOutput::-webkit-scrollbar-thumb:hover { background: var(--border-focus); }

/* ── Lua syntax ───────────────────────────────────────────────────────────────── */
.kw  { color: var(--lua-kw); }
.str { color: var(--lua-str); }
.cmt { color: var(--lua-cmt); font-style: italic; }
.num { color: var(--lua-num); }

/* ── Status bar ───────────────────────────────────────────────────────────────── */
#statusBar {
  padding: 6px 16px;
  font-size: 0.7rem;
  background: var(--bg-surface);
  border-top: 1px solid var(--border-subtle);
  color: var(--text-muted);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
}
#statusBar::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--success);
  flex-shrink: 0;
}

/* ── Copy badge ───────────────────────────────────────────────────────────────── */
#copyBadge {
  position: fixed;
  bottom: 40px;
  right: 430px;
  background: var(--bg-raised);
  border: 1px solid var(--success);
  color: var(--success);
  padding: 7px 14px;
  border-radius: var(--radius-md);
  font-size: 0.78rem;
  font-weight: 600;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  animation: badgeFade 2.2s forwards;
  display: none;
}
@keyframes badgeFade {
  0%      { opacity:0; transform:translateY(4px); }
  10%,75% { opacity:1; transform:translateY(0); }
  100%    { opacity:0; transform:translateY(-4px); }
}

/* ════════════════════════════════════════════════════════════════════════════
   BLOCKLY OVERRIDES — minimal, ne pas casser le rendu des blocs
   ════════════════════════════════════════════════════════════════════════════ */

/* Canvas */
.blocklyMainBackground { fill: #0e1117 !important; }
.blocklyGridLine       { stroke: #1c2433 !important; }

/* Scrollbars */
.blocklyScrollbarHandle     { fill: #2a3d55 !important; }
.blocklyScrollbarBackground { fill: transparent !important; }

/* Toolbox */
.blocklyToolboxDiv {
  background: #141921 !important;
  border-right: 1px solid #1f2d40 !important;
}
.blocklyTreeLabel {
  color: #8a9bb5 !important;
  font-size: 0.78rem !important;
  font-family: 'Inter', sans-serif !important;
}
.blocklyTreeRow:hover        { background: #243044 !important; }
.blocklyTreeSelected > .blocklyTreeRow { background: #1c2433 !important; }
.blocklyTreeSelected .blocklyTreeLabel { color: #e2e8f0 !important; }

/* Flyout */
.blocklyFlyoutBackground { fill: #141921 !important; opacity: 1 !important; }

/* ── Block text ───────────────────────────────────────────────────────────────
   Force text to black everywhere — readable on all block colours.
   1px stroke = subtle dark halo, keeps emoji visible near dark block edges.
   paint-order: stroke fill ensures stroke draws BEHIND the fill, not over it.
*/
.blocklyText {
  fill: #000000 !important;
  paint-order: stroke fill !important;
  stroke: rgba(0, 0, 0, 0.35) !important;
  stroke-width: 1px !important;
  stroke-linejoin: round !important;
}
.blocklyEditableText text,
.blocklyNonEditableText text {
  fill: #000000 !important;
  paint-order: stroke fill !important;
  stroke: rgba(0, 0, 0, 0.35) !important;
  stroke-width: 1px !important;
  stroke-linejoin: round !important;
}

/* Tooltip */
.blocklyTooltipDiv {
  z-index: 99999 !important;
  max-width: 360px !important;
  white-space: pre-line !important;
  background: #1c2433 !important;
  color: #e2e8f0 !important;
  border: 1px solid #4a9eff !important;
  border-radius: 8px !important;
  padding: 10px 14px !important;
  font-size: 0.74rem !important;
  font-family: 'Inter', sans-serif !important;
  line-height: 1.6 !important;
  box-shadow: 0 8px 24px rgba(0,0,0,0.7) !important;
  pointer-events: none !important;
}

/* ── Responsive ──────────────────────────────────────────────────────────────── */
@media (max-width: 1100px) {
  .output-panel { width: 360px; }
  #scriptName   { width: 110px; }
}

/* ── Help documentation ─────────────────────────────────────────────────────── */
.help-doc {
  flex: 1;
  overflow: auto;
  padding: 14px;
  color: var(--text-secondary);
  font-size: 0.78rem;
  line-height: 1.55;
}
.help-doc::-webkit-scrollbar        { width: 5px; height: 5px; }
.help-doc::-webkit-scrollbar-track  { background: transparent; }
.help-doc::-webkit-scrollbar-thumb  { background: var(--border-muted); border-radius: 3px; }
.help-doc::-webkit-scrollbar-thumb:hover { background: var(--border-focus); }

.help-hero,
.help-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 10px;
  padding: 13px 14px;
  margin-bottom: 12px;
}
.help-hero {
  background:
    radial-gradient(circle at top right, rgba(96,184,255,0.12), transparent 45%),
    linear-gradient(180deg, var(--bg-raised), var(--bg-surface));
  border-color: var(--border-muted);
}
.help-kicker {
  color: var(--accent-bright);
  font-size: 0.64rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.help-hero h2,
.help-card h3 {
  color: var(--text-primary);
  margin: 0 0 8px;
  font-size: 0.94rem;
  line-height: 1.25;
}
.help-card h4 {
  color: var(--text-primary);
  margin: 0 0 6px;
  font-size: 0.78rem;
}
.help-hero p,
.help-card p { margin: 0 0 8px; }
.help-card p:last-child { margin-bottom: 0; }

.help-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}
.help-grid .help-card { margin-bottom: 0; }

.help-card ul,
.help-card ol {
  padding-left: 18px;
  margin: 0;
}
.help-card li { margin: 5px 0; }
.help-card strong { color: var(--text-primary); font-weight: 600; }
.help-card em { color: var(--accent-bright); font-style: normal; }
.help-card code,
.help-tags code {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-code);
  background: var(--bg-base);
  border: 1px solid var(--border-subtle);
  border-radius: 5px;
  padding: 1px 5px;
}

.help-steps {
  counter-reset: help-step;
  list-style: none;
  padding-left: 0 !important;
}
.help-steps li {
  position: relative;
  padding-left: 28px;
}
.help-steps li::before {
  counter-increment: help-step;
  content: counter(help-step);
  position: absolute;
  left: 0;
  top: 2px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent-glow);
  color: var(--accent-bright);
  border: 1px solid rgba(96,184,255,0.28);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.62rem;
  font-weight: 700;
}

.help-tags {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 7px 10px;
  align-items: center;
}
.help-tags span { color: var(--text-secondary); }

.help-category-list {
  display: grid;
  gap: 8px;
}
.help-category-list div {
  border-left: 3px solid var(--c, var(--border-muted));
  background: rgba(255,255,255,0.018);
  border-radius: 6px;
  padding: 7px 9px;
}
.help-category-list span {
  color: var(--text-primary);
  font-weight: 700;
}
.help-category-list p {
  margin: 3px 0 0;
  color: var(--text-secondary);
}

.help-do-dont {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.help-do-dont > div {
  background: var(--bg-base);
  border: 1px solid var(--border-subtle);
  border-radius: 8px;
  padding: 10px;
}
.help-note {
  color: var(--text-muted);
  border-top: 1px solid var(--border-subtle);
  padding-top: 8px;
}

@media (max-width: 1180px) {
  .help-grid,
  .help-do-dont { grid-template-columns: 1fr; }
}

</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
  <div class="brand">
    <div class="brand-title">
      <h1>⚙ StarMade NPC Creator</h1>
      <div class="subtitle" data-i18n="subtitle">Visual Lua dialog builder</div>
    </div>
  </div>

  <div class="hdivider"></div>

  <div class="script-name-wrap">
    <label for="scriptName" data-i18n="script">Script</label>
    <input id="scriptName" type="text" value="my-npc" placeholder="my-npc" autocomplete="off" spellcheck="false" />
  </div>

  <div class="hdivider"></div>

  <select id="exampleSelect" title="Load an example">
    <optgroup label="── Basic">
      <option value="welcome_kiosk">📋 Welcome Kiosk</option>
      <option value="toll_booth">🚧 Toll Booth</option>
    </optgroup>
    <optgroup label="── Intermediate">
      <option value="crew_recruiter">👥 Crew Recruiter</option>
    </optgroup>
    <optgroup label="── Advanced">
      <option value="delivery_quest">📜 Delivery Quest</option>
      <option value="reputation_shop">⭐ Reputation Shop</option>
    </optgroup>
    <optgroup label="── Very Advanced">
      <option value="guild_faction_hub">🏛 Guild Faction Hub</option>
    </optgroup>
  </select>
  <button class="btn btn-secondary" data-i18n="loadExample" onclick="loadExample(document.getElementById('exampleSelect').value)">Load example</button>

  <div class="hdivider"></div>

  <button class="btn btn-secondary" data-i18n="import" onclick="importWorkspace()">📥 Import</button>
  <button class="btn btn-secondary" data-i18n="export" onclick="exportWorkspace()">📤 Export</button>
  <button class="btn btn-secondary" data-i18n="clear" onclick="clearWorkspace()">🗑 Clear</button>


  <div class="hdivider"></div>
  <div class="script-name-wrap">
    <label for="languageSelect" data-i18n="langLabel">Language</label>
    <select id="languageSelect">
      <option value="en">English</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
    </select>
  </div>

  <div class="spacer"></div>

  <button class="btn btn-success" data-i18n="copyLua" onclick="copyLua()">📋 Copy Lua</button>
  <button class="btn btn-success" data-i18n="download" onclick="downloadLua()">⬇ Download</button>

  <input type="file" id="fileInput" accept=".json,.lua" style="display:none" onchange="onFileLoad(event)" />
</header>

<!-- ── Main ────────────────────────────────────────────────────────────────── -->
<div class="main">
  <div id="blocklyDiv"></div>

  <div class="output-panel">
    <div class="output-tabs">
      <div class="tab active" data-i18n="luaOutput" onclick="showTab('lua')">Lua Output</div>
      <div class="tab" data-i18n="help" onclick="showTab('help')">Help</div>
    </div>

    <div class="tab-content active" id="tab-lua">
      <pre id="luaOutput" data-i18n="workspaceHint">-- Drag blocks from the toolbox to build your NPC dialog.</pre>
    </div>

    <div class="tab-content" id="tab-help">
      <div id="helpOutput" class="help-doc"></div>
    </div>

    <div id="statusBar" data-i18n="ready">Ready — drag blocks from the toolbox.</div>
  </div>
</div>

<div id="copyBadge" data-i18n="copied">✓ Copied!</div>
<!-- Toolbox is provided by ui/src/toolbox.js -->

        <section class="help-hero">
          <div class="help-kicker">Integrated guide</div>
          <h2>StarMade NPC Creator Help</h2>
          <p>Build NPC dialog trees visually, generate Lua automatically, then import the Lua back without losing structure when possible.</p>
        </section>

        <section class="help-card">
          <h3>🚀 Quick workflow</h3>
          <ol class="help-steps">
            <li><strong>Start with a Greeting</strong> block — it is the mandatory root entry of the dialog.</li>
            <li><strong>Add Choice</strong> blocks under the greeting to give the player options.</li>
            <li><strong>Attach actions</strong> inside choices: hire crew, give items, quests, reputation, cooldowns…</li>
            <li><strong>Read the Lua Output</strong> panel on the right — it updates live after every edit.</li>
            <li><strong>Export JSON</strong> to save an editable project, or <strong>Download Lua</strong> to deploy to StarMade.</li>
          </ol>
        </section>

        <section class="help-grid">
          <article class="help-card">
            <h3>📋 Dialog basics</h3>
            <ul>
              <li><strong>Greeting</strong> — required root node.</li>
              <li><strong>Choice</strong> — player button leading to actions or a sub-menu.</li>
              <li><strong>Say</strong> — NPC text, auto-advances to the next block after the timer.</li>
              <li><strong>Say with choices</strong> — creates a sub-menu anywhere in a branch.</li>
              <li><strong>Confirm</strong> — prompts Yes / No before a sensitive action.</li>
              <li><strong>Go Back</strong> — returns the player to the parent dialog node.</li>
            </ul>
          </article>

          <article class="help-card">
            <h3>✅ Branches vs 🧩 Expressions</h3>
            <ul>
              <li><strong>Branches</strong> are action blocks with THEN / ELSE outputs (readable, self-contained).</li>
              <li><strong>Expressions</strong> are composable condition pieces that plug into <em>If Condition</em>.</li>
              <li>Combine expressions with AND / OR / NOT for complex conditions.</li>
              <li>Use branches for simple checks; expressions for composed logic.</li>
            </ul>
          </article>

          <article class="help-card">
            <h3>🧮 Variables</h3>
            <ul>
              <li><strong>Variable</strong> blocks are floating Lua constant declarations.</li>
              <li><strong>Var Reference</strong> connects a variable to a numeric field (prices, amounts, coordinates).</li>
              <li>Missing references produce a blocking warning before Lua generation.</li>
              <li>Variables are placed on the workspace, not inside the dialog tree.</li>
            </ul>
          </article>

          <article class="help-card">
            <h3>💬 Text placeholders</h3>
            <div class="help-tags">
              <code>{name}</code><span>NPC name</span>
              <code>{partner}</code><span>NPC affinity</span>
              <code>{faction}</code><span>faction name</span>
              <code>{owner}</code><span>commander name</span>
              <code>{self}</code><span>player name</span>
            </div>
            <p style="margin-top:8px;font-size:0.78rem;color:var(--text-secondary)">Use <code>%s</code> in Say with Value / Get Info to display a live stat.</p>
          </article>
        </section>

        <section class="help-card">
          <h3>🗂 Block categories — quick reference</h3>
          <div class="help-category-list">
            <div>
              <span style="--c:#1565c0">📋 Dialog</span>
              <p>Greeting (root), Say, Say with Choices, Say + Value, Confirm, Choice, Go Back.</p>
            </div>
            <div>
              <span style="--c:#6a1b9a">🧮 Variables</span>
              <p>Floating Lua constants and Var Reference inputs for prices, counts and coordinates.</p>
            </div>
            <div>
              <span style="--c:#1b5e20">👥 Crew</span>
              <p>Hire (with price), Unhire, Spawn Crew — all with full reaction branches.</p>
            </div>
            <div>
              <span style="--c:#d84315">🛒 Items</span>
              <p>Give Credits, Take Item, Give Type, Sell Item, Give Meta Item, Check Inventory, Send Message.</p>
            </div>
            <div>
              <span style="--c:#283593">⚡ World</span>
              <p>Activate Block, Move NPC, Destroy Ship, Give Gravity, Call Tutorial.</p>
            </div>
            <div>
              <span style="--c:#546e7a">🔗 Sequences</span>
              <p>Auto Sequence, Wait Until (polling), Delayed Follow-Up.</p>
            </div>
            <div>
              <span style="--c:#006064">💾 SQLite / Memory</span>
              <p>Memory Set/Increment, SQLite Get/Set/Increment — backed by the StarMade HSQLDB driver.</p>
            </div>
            <div>
              <span style="--c:#b71c1c">📜 Quests</span>
              <p>Advanced Quest Offer (state-aware), Quest Offer, Start, Set Step, Require Status/Step, Objective, Reward, Complete, Fail.</p>
            </div>

            </div>
            <div>
              <span style="--c:#33691e">📦 Stock</span>
              <p>Stock Init, Sell, Add, Reset, Get, Check — persistent shop inventory per shop ID.</p>
            </div>
            <div>
              <span style="--c:#795548">🚩 Flags &amp; World State</span>
              <p>Flag Set, Check Flag (DB), World State Set/Get, Get World, Check World — global and per-player persistence.</p>
            </div>
            <div>
              <span style="--c:#2e7d32">✅ Branches</span>

            </div>
            <div>
              <span style="--c:#455a64">🧩 Expressions</span>

            </div>
            <div>
              <span style="--c:#ad1457">🔧 Advanced</span>
              <p>Get Info (live stat display), Custom Hook (raw Lua), Set Conversation State, Delayed Follow-Up.</p>
            </div>
          </div>
        </section>

        <section class="help-grid">
          <article class="help-card">
            <h3>📜 Quest system</h3>
            <ul>
              <li>Quests are stored in the <code>npc_quests</code> HSQLDB table per player.</li>
              <li>Fields: <code>player</code>, <code>quest_id</code>, <code>status</code> (none/active/complete/failed), <code>step</code>.</li>
              <li><strong>Advanced Quest Offer</strong> checks status automatically before presenting the offer.</li>
              <li><strong>Quest Require Status/Step</strong> branch on persistent state without offering a new quest.</li>
              <li><strong>Quest Reward</strong> is composable: credits + item + reputation + flag in one block.</li>
              <li>Helpers <code>_questSet</code>, <code>_questStatus</code>, <code>_questStep</code> are injected automatically.</li>
            </ul>
          </article>

          <article class="help-card">
            <h3>💾 Persistence (HSQLDB)</h3>
            <ul>
              <li>StarMade ships <code>lib/hsqldb.jar</code> — no external driver needed.</li>
              <li>Each subsystem auto-creates its table on first use.</li>
              <li>Tables: <code>npc_quests</code>, <code>npc_memory</code>, <code>npc_reputation</code>, <code>npc_cooldowns</code>, <code>npc_shop_stock</code>.</li>
              <li>World-state values are global (not per-player): stored in <code>npc_memory</code> with a <code>world:</code> prefix.</li>
              <li>Custom tables via <code>npc_sqlite_table</code> + SQLite Get/Set/Increment blocks.</li>
            </ul>
          </article>

          <article class="help-card">
            <h3>📝 Comments</h3>
            <ul>
              <li>Add a Blockly comment to any block — it appears above the generated Lua.</li>
              <li>On import, comments before hook/node declarations are restored to the block.</li>
              <li>Use comments to document quest steps, expected states or design intent.</li>
            </ul>
          </article>

          <article class="help-card">
            <h3>⛔ Disabled blocks</h3>
            <ul>
              <li>Right-click → Disable to grey out any block.</li>
              <li>Hook functions emit inside <code>--[[ DISABLED … --]]</code>.</li>
              <li>All wiring (hook instance, setHook, addReaction, :add()) uses <code>-- [DISABLED]</code>.</li>
              <li>The full subtree inside a disabled Choice is also disabled automatically.</li>
              <li>Importing a Lua with disabled markers restores the block as disabled.</li>
            </ul>
          </article>
        </section>

        <section class="help-card">
          <h3>📥 Import / Export</h3>
          <div class="help-do-dont">
            <div>
              <h4>✅ Good practice</h4>
              <ul>
                <li>Save your work as <strong>Export JSON</strong> while editing.</li>
                <li>Use <strong>Download Lua</strong> only when deploying to StarMade.</li>
                <li>Keep generated <code>-- [DISABLED]</code> markers if you want round-trip fidelity.</li>
                <li>Name your Script in the header field before downloading.</li>
              </ul>
            </div>
            <div>
              <h4>⚠️ Known limitations</h4>
              <ul>
                <li>Very custom Lua (complex setFollowUp, self-loops, raw API calls) may import as Custom Hook blocks.</li>
                <li>Hook-less blocks (Quest Objective) import as <em>Say</em> — functionally identical.</li>
                <li>Manual Lua edits between export/import reduce round-trip quality.</li>
                <li>Vanilla StarMade scripts import as a best-effort approximation.</li>
              </ul>
            </div>
          </div>
        </section>
