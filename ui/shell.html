<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarMade NPC Creator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/blockly@10.4.3/blockly.min.js"></script>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
  <div class="brand">
    <div class="brand-title">
      <h1>⚙ StarMade NPC Creator</h1>
      <div class="subtitle" data-i18n="Visual Lua dialog builder">Visual Lua dialog builder</div>
    </div>
  </div>

  <div class="hdivider"></div>

  <div class="script-name-wrap">
    <label for="scriptName" data-i18n="Script">Script</label>
    <input id="scriptName" type="text" value="my-npc" placeholder="my-npc" autocomplete="off" spellcheck="false" />
  </div>

  <div class="hdivider"></div>

  <select id="exampleSelect" title="Load an example" data-i18n-title="Load an example">
    <optgroup label="── Basic" data-i18n-label="── Basic">
      <option value="welcome_kiosk" data-i18n="📋 Welcome Kiosk">📋 Welcome Kiosk</option>
      <option value="toll_booth" data-i18n="🚧 Toll Booth">🚧 Toll Booth</option>
    </optgroup>
    <optgroup label="── Intermediate" data-i18n-label="── Intermediate">
      <option value="crew_recruiter" data-i18n="👥 Crew Recruiter">👥 Crew Recruiter</option>
    </optgroup>
    <optgroup label="── Advanced" data-i18n-label="── Advanced">
      <option value="delivery_quest" data-i18n="📜 Delivery Quest">📜 Delivery Quest</option>
      <option value="reputation_shop" data-i18n="⭐ Reputation Shop">⭐ Reputation Shop</option>
    </optgroup>
    <optgroup label="── Very Advanced" data-i18n-label="── Very Advanced">
      <option value="guild_faction_hub" data-i18n="🏛 Guild Faction Hub">🏛 Guild Faction Hub</option>
    </optgroup>
  </select>
  <button class="btn btn-secondary" onclick="loadExample(document.getElementById('exampleSelect').value)" data-i18n="Load example">Load example</button>

  <div class="hdivider"></div>

  <button class="btn btn-secondary" onclick="importWorkspace()" data-i18n="📥 Import">📥 Import</button>
  <button class="btn btn-secondary" onclick="exportWorkspace()" data-i18n="📤 Export">📤 Export</button>
  <button class="btn btn-secondary" onclick="clearWorkspace()" data-i18n="🗑 Clear">🗑 Clear</button>

  <div class="spacer"></div>

  <div class="script-name-wrap">
    <label for="languageSelect" data-i18n="Language">Language</label>
    <select id="languageSelect" title="Language" data-i18n-title="Language">
      <option value="en" data-i18n="English">English</option>
      <option value="fr" data-i18n="Français">Français</option>
      <option value="de" data-i18n="German">Deutsch</option>
      <option value="es" data-i18n="Spanish">Español</option>
      <option value="ru" data-i18n="Russian">Русский</option>
      <option value="ja" data-i18n="Japanese">日本語</option>
    </select>
  </div>

  <button class="btn btn-success" onclick="copyLua()" data-i18n="📋 Copy Lua">📋 Copy Lua</button>
  <button class="btn btn-success" onclick="downloadLua()" data-i18n="⬇ Download">⬇ Download</button>

  <input type="file" id="fileInput" accept=".json,.lua" style="display:none" onchange="onFileLoad(event)" />
</header>

<!-- ── Main ────────────────────────────────────────────────────────────────── -->
<div class="main">
  <div id="blocklyDiv"></div>

  <div class="output-panel">
    <div class="output-tabs">
      <div class="tab active" onclick="showTab('lua')" data-i18n="Lua Output">Lua Output</div>
      <div class="tab"       onclick="showTab('help')" data-i18n="Help">Help</div>
    </div>

    <div class="tab-content active" id="tab-lua">
      <pre id="luaOutput" data-i18n="-- Drag blocks from the toolbox to build your NPC dialog.">-- Drag blocks from the toolbox to build your NPC dialog.</pre>
    </div>

    <div class="tab-content" id="tab-help">
      <div id="helpOutput" class="help-doc"></div>
    </div>

    <div id="statusBar" data-i18n="Ready — drag blocks from the toolbox.">Ready — drag blocks from the toolbox.</div>
  </div>
</div>

<div id="copyBadge" data-i18n="✓ Copied!">✓ Copied!</div>
<!-- Toolbox is provided by ui/src/toolbox.js -->


<!-- BUNDLE -->

</body>
</html>
